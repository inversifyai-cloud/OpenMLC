# OpenMLC — single-container deploy.
#
# Usage:
#   1. cp .env.docker.example .env
#   2. Fill in SESSION_SECRET and ENCRYPTION_KEY (generate with `openssl rand -hex 32`)
#   3. docker login ghcr.io -u <github-username>      # only for private images
#   4. docker compose up -d
#   5. open http://localhost:3000
#
# Updates:
#   docker compose pull && docker compose up -d
#
# WARNING: `docker compose down -v` wipes your conversations + uploaded files.

services:
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    networks: [default]
    environment:
      # How long a loaded model stays in VRAM/RAM after last use.
      # Reduce to free memory on low-RAM machines; set to "0" to unload immediately.
      OLLAMA_KEEP_ALIVE: "${OLLAMA_KEEP_ALIVE:-5m}"
    # Uncomment the block below to enable NVIDIA GPU passthrough:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  browser:
    image: ghcr.io/inversifyai-cloud/openmlc-browser:latest
    profiles: ["browser"]
    restart: unless-stopped
    shm_size: 1gb
    networks: [default]

  openmlc:
    image: ghcr.io/inversifyai-cloud/openmlc:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openmlc
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: "file:/data/openmlc.db"
      OPENMLC_BROWSER_URL: "http://browser:3030"
      OPENMLC_BROWSER_ENABLED: "${OPENMLC_BROWSER_ENABLED:-false}"
      # Point at the ollama sidecar. Override if you run Ollama externally.
      OLLAMA_BASE_URL: "${OLLAMA_BASE_URL:-http://ollama:11434/v1}"
      # openmlc-agent: runs natively on your host machine (not in Docker).
      # Mac: host.docker.internal resolves automatically.
      # Linux: use 172.17.0.1 or set OPENMLC_COMPUTER_URL explicitly.
      OPENMLC_COMPUTER_URL: "${OPENMLC_COMPUTER_URL:-http://host.docker.internal:3031}"
      OPENMLC_COMPUTER_TOKEN: "${OPENMLC_COMPUTER_TOKEN:-}"
    extra_hosts:
      # Allows Docker containers to reach the host machine on Linux.
      - "host.docker.internal:host-gateway"
    volumes:
      - openmlc-data:/data
      - openmlc-uploads:/app/uploads
    depends_on:
      - ollama
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:3000/api/models >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  openmlc-data:
  openmlc-uploads:
  ollama-data:
